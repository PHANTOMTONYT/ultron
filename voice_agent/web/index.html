<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desi Jarvis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <!-- Fullscreen ASCII Background Canvas -->
  <canvas id="ascii-bg-canvas"></canvas>

  <div id="card">
    <h1>Desi Jarvis</h1>
    <p id="status">Disconnected</p>

    <button id="connect-btn" type="button">Connect &amp; Enable Mic</button>
    <button id="mute-btn" type="button" disabled>Mute</button>

    <div id="transcript"></div>

    <div id="log"></div>
  </div>

  <script type="module" src="app.js?v=10"></script>
</body>
</html>
