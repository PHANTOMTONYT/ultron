<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDITH</title>
  <base href="/renderer/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Container for WebGL visualizer -->
  <div id="container">
    <canvas id="visualizer-canvas"></canvas>

    <!-- Always-visible primary mic control - click to talk, anchored just below Baymax -->
    <button class="mic-main-btn" id="mic-toggle-btn" title="Click to speak" type="button">
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-0.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
  </div>

  <!-- Settings trigger (Gear icon) -->
  <div class="settings-trigger" id="settings-trigger">
    <svg viewBox="0 0 24 24">
      <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.13,5.91,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12c0,0.31,0.04,0.64,0.08,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
    </svg>
  </div>

  <!-- Glassmorphism Settings overlay -->
  <div class="settings-panel" id="settings-panel">
    <div class="panel-header">
      <h3>EDITH Control</h3>
      <span class="close-btn" id="close-settings">&times;</span>
    </div>

    <!-- Active State controls for manual testing -->
    <div class="control-group">
      <label>Visual State</label>
      <div class="theme-grid">
        <button class="btn-state active" data-state="idle">Idle</button>
        <button class="btn-state" data-state="listening">Listen</button>
        <button class="btn-state" data-state="thinking">Think</button>
        <button class="btn-state" data-state="speaking">Speak</button>
        <button class="btn-state" data-state="happy">Happy</button>
        <button class="btn-state" data-state="celebrating">Celeb</button>
        <button class="btn-state" data-state="confused">Confuse</button>
        <button class="btn-state" data-state="sleeping">Sleep</button>
      </div>
    </div>

    <!-- Voice Connection Mode Selection -->
    <div class="control-group" style="margin-top: 10px;">
      <label>Voice Channel Mode</label>
      <div style="display: flex; gap: 8px; margin-bottom: 6px;">
        <button class="btn-state active" id="btn-mode-ws" style="flex: 1; padding: 6px 2px;">WebSocket (Failsafe)</button>
        <button class="btn-state" id="btn-mode-webrtc" style="flex: 1; padding: 6px 2px;">LiveKit WebRTC</button>
      </div>
    </div>

    <!-- Manual text messaging -->
    <div class="chat-box">
      <input type="text" id="chat-input" placeholder="Type a message to your companion...">
      <button id="send-chat-btn">Send</button>
    </div>

    <!-- Status elements -->
    <div class="status-bar">
      <div>
        <span class="status-dot" id="status-dot"></span>
        <span id="connection-text">Connecting to backend...</span>
      </div>
      <div>
        <span>Mic STT: <strong id="mic-status">Active</strong></span>
      </div>
    </div>
  </div>

  <!-- Speech Transcript Subtitles Overlay -->
  <div id="captions-overlay"></div>

  <!-- Load Renderer script -->
  <script type="module" src="app.js"></script>
</body>
</html>
